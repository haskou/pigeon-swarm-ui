openapi: 3.0.3
info:
  title: Pigeon-swarm IPFS API
  version: 1.0.0
  description: Endpoints for reading JSON content from IPFS.
tags:
  - name: ipfs
paths:
  /ipfs/replication/status:
    get:
      tags:
        - ipfs
      summary: Get local IPFS replication status
      responses:
        '200':
          description: Local replication diagnostics for IPFS content known by this node.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsReplicationStatus'
  /ipfs/{cid}:
    get:
      tags:
        - ipfs
      summary: Get IPFS content by CID
      parameters:
        - name: cid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON content found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: CID not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IpfsContentNotFoundError'
components:
  schemas:
    IpfsReplicationStatus:
      type: object
      required:
        - localNodeId
        - contents
      properties:
        localNodeId:
          type: string
        contents:
          type: array
          items:
            $ref: '#/components/schemas/IpfsReplicationContentStatus'
    IpfsReplicationContentStatus:
      type: object
      required:
        - cid
        - context
        - sizeBytes
        - priority
        - ownerIdentityId
        - createdAt
        - updatedAt
        - networks
      properties:
        cid:
          type: string
        context:
          type: string
        sizeBytes:
          type: integer
          minimum: 0
        priority:
          type: string
        ownerIdentityId:
          type: string
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
        networks:
          type: array
          items:
            $ref: '#/components/schemas/IpfsReplicationNetworkStatus'
    IpfsReplicationNetworkStatus:
      type: object
      required:
        - networkId
        - activeNodeCount
        - desiredReplicas
        - knownReplicas
        - knownReplicaNodeIds
        - localResponsible
        - releaseLocalReplica
        - responsibleNodeIds
      properties:
        networkId:
          type: string
        activeNodeCount:
          type: integer
          minimum: 0
        desiredReplicas:
          type: integer
          minimum: 0
        knownReplicas:
          type: integer
          minimum: 0
        knownReplicaNodeIds:
          type: array
          items:
            type: string
        localResponsible:
          type: boolean
        releaseLocalReplica:
          type: boolean
        responsibleNodeIds:
          type: array
          items:
            type: string
    IpfsContentNotFoundError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: CID not found in any network
