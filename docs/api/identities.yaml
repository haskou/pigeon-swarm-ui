openapi: 3.0.3
info:
  title: Pigeon-swarm Identities API
  version: 1.0.0
  description: Endpoints for creating identities.
tags:
  - name: identities
paths:
  /identities/:
    post:
      tags:
        - identities
      summary: Create identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostIdentityBody'
      responses:
        '200':
          description: Identity created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
  /identities/{identityId}:
    get:
      tags:
        - identities
      summary: Get latest known identity
      parameters:
        - in: path
          name: identityId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest valid identity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResource'
components:
  schemas:
    PostIdentityBody:
      type: object
      required:
        - name
        - password
      properties:
        name:
          type: string
          example: Alice
        password:
          type: string
          example: super-secret-password
        networks:
          type: array
          items:
            type: string
            format: uuid
    IdentityResource:
      type: object
      required:
        - id
        - encryptedKeyPair
        - profile
        - networks
        - timestamp
        - signature
        - version
      properties:
        id:
          type: string
          example: MCowBQYDK2VwAyEANHSu7gNCaXDe+hzph8c3HomozCnC/LdXe13/WpeIaVM=
        encryptedKeyPair:
          type: object
          required:
            - encryptedPrivateKey
            - publicKey
          properties:
            encryptedPrivateKey:
              type: string
              example: 2s2IhQsbhsmzNWia+DRGOMIQHEcR+Gi45fSM6Di1FOhOPFTs1NB3Fzhi8/bCEcmGdn0WRq5AjN1pb8iZkZpGpNstPm9v4gcPbGqAUnGCAtAQqiPMiJ1Tr9YQCSIUodxwfowdFvBAZaFGNcoObVoYJgnRjWWq2YQ=.f1itGk2AXdi33/e8.OEIZELL7lzYRXWwFSB0wtA==.CuZAT6/b/TiVLT+sp03ULg==
            publicKey:
              type: string
              example: -----BEGIN PUBLIC KEY-----\nMCowBQYDK2VwAyEANHSu7gNCaXDe+hzph8c3HomozCnC/LdXe13/WpeIaVM=\n-----END PUBLIC KEY-----\n
        networks:
          type: array
          items:
            type: string
            format: uuid
        profile:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              example: Alice
            biography:
              type: string
              example: I'm just a regular user of the Pigeon-swarm app!
              nullable: true
            picture:
              type: string
              format: byte
              nullable: true
              example: data:image/jpeg;base64,
        timestamp:
          type: number
        signature:
          type: string
          example: lWbIzBOHn7vYKk3WOB9JMvOq9XeXRRy8qvqh8DRPrvUL839Y6DEFGDgPTTMngt+pBugsWSK6LoTKKULTy8joBw==
        version:
          type: integer
          example: 1
        previousIdentityExternalIdentifier:
          type: string
          nullable: true
